# Fabric Minecraft Server Manifest
# This file declares the server version, Java version, and installed mods.
# For Modrinth mods, provide the version_id; for vendored jars, the local path relative to server/vendored-mods/.
#
# To find version_id for a Modrinth mod:
# 1. Visit https://modrinth.com/mod/{slug}
# 2. Find the desired Fabric version for your MC version
# 3. Right-click the .jar download button → Copy link address to get the download URL
# 4. Extract the version_id from the URL: https://cdn.modrinth.com/data/{project_id}/versions/{version_id}/{filename}

minecraft_version: "26.1.2"
fabric_loader_version: "0.16.11"
java_version: "25"

mods:
  # Default optimization & logging mods
  - slug: "fabric-language-kotlin"
    version_id: "1.13.11+kotlin.2.3.21"  # https://modrinth.com/mod/fabric-language-kotlin
    source: modrinth

  - slug: "fabric-api"
    version_id: "0.147.0+26.1.2"  # https://modrinth.com/mod/fabric-api
    source: modrinth

  - slug: "luckperms"
    version_id: "v5.5.42-fabric"  # https://modrinth.com/mod/luckperms
    source: modrinth

  - slug: "lithium"
    version_id: "mc26.1.2-0.24.2-fabric"  # https://modrinth.com/mod/lithium
    source: modrinth

  - slug: "ferrite-core"
    version_id: "9.0.0-fabric"  # https://modrinth.com/mod/ferrite-core
    source: modrinth

  - slug: "server-replay"
    version_id: "3.4.2+26.1"  # https://modrinth.com/mod/server-replay
    source: modrinth

  - slug: "ledger"
    version_id: "1.3.20"  # https://modrinth.com/mod/ledger
    source: modrinth
  
  - slug: "treevite-custom"
    source: vendored
    path: "tree-invite-0.1.0.jar"

  # Example vendored mod (uncomment to add):
  # - slug: "my-custom-mod"
  #   source: vendored
  #   path: "my-custom-mod.jar"
