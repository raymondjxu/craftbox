name: Build & Verify

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}
  pull_request:
    branches:
      - main


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  resolve-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image: ${{ steps.image.outputs.image }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --quiet pyyaml

      - name: Resolve mods
        run: |
          mkdir -p build/mods
          python scripts/resolve_mods.py --manifest mods/manifest.yaml --out build/mods
          echo "Mods resolved:"
          ls -lh build/mods/ || echo "(no mods)"

      - name: Parse manifest for versions
        id: manifest
        run: |
          python3 << 'EOF'
          import yaml
          with open('mods/manifest.yaml', 'r') as f:
            m = yaml.safe_load(f)
          print(f"java_version={m.get('java_version', '21')}")
          print(f"mc_version={m.get('minecraft_version', 'unknown')}")
          EOF
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-,suffix={{date 'YYYYMMDD-HHmmss'}},enable={{is_pull_request}}
            type=ref,event=branch,enable={{is_push}}
            type=semver,pattern={{version}},enable={{is_tag}}
            type=semver,pattern={{major}}.{{minor}},enable={{is_tag}}
            type=raw,value=latest,enable={{is_main_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JAVA_VERSION=${{ steps.manifest.outputs.java_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: image
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
          fi

  verify:
    runs-on: ubuntu-latest
    needs: resolve-and-build
    if: always()  # Run even if build failed, to help with debugging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --quiet mcstatus

      - name: Determine image to test
        id: image
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, build image locally
            echo "mode=local" >> $GITHUB_OUTPUT
          else
            # For pushes/tags, use the pushed image
            echo "mode=registry" >> $GITHUB_OUTPUT
            echo "image=${{ needs.resolve-and-build.outputs.image }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.image.outputs.mode == 'local'
        uses: docker/setup-buildx-action@v2

      - name: Set up Python for local build
        if: steps.image.outputs.mode == 'local'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps for local build
        if: steps.image.outputs.mode == 'local'
        run: |
          pip install --quiet pyyaml

      - name: Resolve mods (local)
        if: steps.image.outputs.mode == 'local'
        run: |
          mkdir -p build/mods
          python scripts/resolve_mods.py --manifest mods/manifest.yaml --out build/mods

      - name: Parse manifest for Java version (local)
        if: steps.image.outputs.mode == 'local'
        id: manifest
        run: |
          python3 << 'EOF'
          import yaml
          with open('mods/manifest.yaml', 'r') as f:
            m = yaml.safe_load(f)
          print(f"java_version={m.get('java_version', '21')}")
          EOF
        shell: bash

      - name: Build image locally
        if: steps.image.outputs.mode == 'local'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: craftbox-test:latest
          build-args: |
            JAVA_VERSION=${{ steps.manifest.outputs.java_version }}

      - name: Set local image for verify
        if: steps.image.outputs.mode == 'local'
        run: |
          echo "IMAGE_TO_TEST=craftbox-test:latest" >> $GITHUB_ENV

      - name: Set registry image for verify
        if: steps.image.outputs.mode == 'registry'
        run: |
          echo "IMAGE_TO_TEST=${{ needs.resolve-and-build.outputs.image }}" >> $GITHUB_ENV

      - name: Verify server startup and connectivity
        run: |
          python scripts/verify_server.py \
            "$IMAGE_TO_TEST" \
            --host 127.0.0.1 \
            --port 25565 \
            --timeout 240 \
            --test-persistence

      - name: Show Docker info on failure
        if: failure()
        run: |
          echo "=== Docker images ===" 
          docker images || true
          echo "=== Docker processes ==="
          docker ps -a || true
