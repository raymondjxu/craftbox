name: Build & Verify

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  resolve-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.image }}
      image-digest: ${{ steps.build.outputs.digest }}
      java-version: ${{ steps.manifest.outputs.java_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --quiet pyyaml

      - name: Resolve mods
        run: |
          mkdir -p build/mods
          python scripts/resolve_mods.py --manifest mods/manifest.yaml --out build/mods
          echo "Mods resolved:"
          ls -lh build/mods/ || echo "(no mods)"

      - name: Parse manifest for versions
        id: manifest
        shell: bash
        run: |
          python3 - <<'EOF' >> "$GITHUB_OUTPUT"
          import yaml
          with open('mods/manifest.yaml', 'r') as f:
              m = yaml.safe_load(f) or {}
          print(f"java_version={m.get('java_version', '25')}")
          print(f"mc_version={m.get('minecraft_version', 'unknown')}")
          EOF
          echo "Parsed manifest:"
          cat "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JAVA_VERSION=${{ steps.manifest.outputs.java_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          # Use the immutable sha-tag emitted by metadata-action so the verify
          # job pulls the exact image we just built.
          sha_tag="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "image=${sha_tag}" >> "$GITHUB_OUTPUT"

  verify:
    runs-on: ubuntu-latest
    needs: resolve-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # PR runs rebuild the image here, and server/*.jar is LFS-tracked.
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --quiet pyyaml mcstatus

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Resolve mods (PR local build)
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p build/mods
          python scripts/resolve_mods.py --manifest mods/manifest.yaml --out build/mods

      - name: Build image locally (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: craftbox-test:latest
          build-args: |
            JAVA_VERSION=${{ needs.resolve-and-build.outputs.java-version }}

      - name: Log in to Container Registry (non-PR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image to test
        id: image
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=craftbox-test:latest" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ needs.resolve-and-build.outputs.image }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify server startup and connectivity
        run: |
          python scripts/verify_server.py \
            "${{ steps.image.outputs.ref }}" \
            --host 127.0.0.1 \
            --port 25565 \
            --timeout 240 \
            --test-persistence

      - name: Show Docker info on failure
        if: failure()
        run: |
          echo "=== Docker images ==="
          docker images || true
          echo "=== Docker processes ==="
          docker ps -a || true
